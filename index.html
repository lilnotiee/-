<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notiee</title>

<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;

font-family:'Onest',sans-serif;

/* EXACT CURSOR */

cursor:url("https://r2.guns.lol/7db0ae3b-d0ae-4956-b99d-2abf9045267a.png") 16 16, auto !important;

}

body{

height:100vh;
overflow:hidden;

background:#080808;

display:flex;
justify-content:center;
align-items:center;

position:relative;

color:white;

}

/* VIDEO */

.bg{

position:absolute;

width:100%;
height:100%;

object-fit:cover;

z-index:-5;

filter:
brightness(0.42)
contrast(1.05);

transform:scale(1.02);

}

/* OVERLAY */

.overlay{

position:absolute;

width:100%;
height:100%;

background:
rgba(0,0,0,0.25);

z-index:-4;

}

/* SNOW */

.snow{

position:absolute;

width:100%;
height:100%;

overflow:hidden;

pointer-events:none;

z-index:-3;

}

/* PROFILE */

.profile{

display:flex;
flex-direction:column;
align-items:center;
text-align:center;

animation:fade 0.7s ease;

}

/* AVATAR */

.avatar{

width:120px;
height:120px;

border-radius:35px;

object-fit:cover;

border:
2px solid rgba(255,255,255,0.30);

}

/* NAME */

h1{

margin-top:18px;

font-size:39.5px;
font-weight:600;

letter-spacing:-1px;

text-shadow:
0 0 12px rgba(255,255,255,0.92);

}

/* BIO */

.bio{

margin-top:8px;

font-size:19px;

font-weight:570;

}

/* LOCATION */

.location{

margin-top:10px;

font-size:15px;

opacity:0.7;

display:flex;
align-items:center;
gap:6px;

}

/* DISCORD EFFECT */

.discord-effect-wrapper{

margin-top:22px;

display:flex;
justify-content:center;
align-items:center;

position:relative;

}

.discord-effect{

position:relative;

font-size:24px;

color:white;

text-decoration:none;

opacity:0.95;

transition:0.3s ease;

text-shadow:
0 0 5px rgba(255,255,255,0.20),
0 0 12px rgba(255,255,255,0.15),
0 0 22px rgba(255,255,255,0.08);

animation:
discordFloat 3s ease-in-out infinite,
discordPulse 4s ease infinite;

}

.discord-effect::before{

content:'';

position:absolute;

inset:-14px;

border-radius:50%;

background:
radial-gradient(
circle,
rgba(255,255,255,0.10),
transparent 70%
);

opacity:0.7;

z-index:-1;

animation:
glowPulse 3s ease infinite;

}

.discord-effect:hover{

transform:
translateY(-2px)
scale(1.06);

text-shadow:
0 0 10px rgba(255,255,255,0.45),
0 0 22px rgba(255,255,255,0.22),
0 0 34px rgba(255,255,255,0.12);

}

/* GLASS */

.glass{

margin-top:18px;

width:320px;

padding:14px;

border-radius:20px;

background:
rgba(255,255,255,0.04);

border:
1px solid rgba(255,255,255,0.03);

backdrop-filter:none;

box-shadow:none;

}

/* DISCORD BOX */

.discord{

display:flex;
align-items:center;
gap:12px;

}

.discord img{

width:52px;
height:52px;

border-radius:16px;

object-fit:cover;

border:
2px solid rgba(27,27,27,0.15);

}

.discord-info{

text-align:left;

}

.discord-info h3{

font-size:15px;
font-weight:550;

}

.discord-info p{

font-size:13px;

opacity:0.7;

margin-top:3px;

}

/* MUSIC */

.song{

display:flex;
align-items:center;
gap:12px;

margin-bottom:12px;

}

.song img{

width:52px;
height:52px;

border-radius:14px;

object-fit:cover;

}

.song-info{

text-align:left;

}

.song-info h4{

font-size:15px;

}

.song-info p{

font-size:13px;

opacity:0.7;

margin-top:2px;

}

audio{

width:100%;
height:32px;

filter:
invert(1)
grayscale(1);

}

/* SOCIALS */

.socials{

margin-top:22px;

display:flex;
gap:16px;

}

.social{

font-size:22px;

color:white;

transition:0.25s ease;

opacity:0.92;

text-shadow:
0 0 8px rgba(255,255,255,0.18);

}

.social:hover{

transform:translateY(-2px);

opacity:1;

text-shadow:
0 0 12px rgba(255,255,255,0.35);

}

/* ANIMATIONS */

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0px);
}

}

@keyframes fall{

0%{
transform:translateY(-10vh);
}

100%{
transform:translateY(110vh);
}

}

@keyframes discordFloat{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-2px);
}

100%{
transform:translateY(0px);
}

}

@keyframes discordPulse{

0%{
opacity:0.88;
}

50%{
opacity:1;
}

100%{
opacity:0.88;
}

}

@keyframes glowPulse{

0%{
transform:scale(0.95);
opacity:0.45;
}

50%{
transform:scale(1.08);
opacity:0.8;
}

100%{
transform:scale(0.95);
opacity:0.45;
}

}

/* MOBILE */

@media(max-width:450px){

.glass{
width:92%;
}

.avatar{
width:105px;
height:105px;
}

h1{
font-size:34px;
}

.bio{
font-size:17px;
}

}

</style>

</head>

<body>

<!-- VIDEO -->

<video autoplay muted loop class="bg">

<source src="background.mp4" type="video/mp4">

</video>

<!-- GIF -->

<img
src="background.gif"
class="bg"
id="gifBg"
style="display:none;"
>

<div class="overlay"></div>

<!-- SNOW -->

<div class="snow"></div>

<!-- PROFILE -->

<div class="profile">

<img
class="avatar"
src="pfp.jpg"
/>

<h1>Notiee</h1>

<p class="bio">
Heyy 🧸🩶
</p>

<div class="location">

<i class="fa-solid fa-location-dot"></i>

India

</div>

<!-- DISCORD EFFECT -->

<div class="discord-effect-wrapper">

<a
href="https://discord.gg/UW7VcVCvn9"
class="discord-effect">

<i class="fa-brands fa-discord"></i>

</a>

</div>

<!-- DISCORD BOX -->

<div class="glass">

<div class="discord">

<img
id="discordAvatar"
src="pfp.jpg"
/>

<div class="discord-info">

<h3 id="discordName">
Loading...
</h3>

<p id="discordStatus">
Connecting Discord...
</p>

</div>

</div>

</div>

<!-- MUSIC -->

<div class="glass">

<div class="song">

<img src="cover.jpg"/>

<div class="song-info">

<h4>Banjar</h4>

<p>Now Playing</p>

</div>

</div>

<audio controls autoplay loop>

<source src="music.mp3">

</audio>

</div>

<!-- SOCIALS -->

<div class="socials">

<a href="https://instagram.com/" class="social">
<i class="fa-brands fa-instagram"></i>
</a>

<a href="https://spotify.com/" class="social">
<i class="fa-brands fa-spotify"></i>
</a>

<a href="https://github.com/" class="social">
<i class="fa-brands fa-github"></i>
</a>

</div>

</div>

<script>

/* GIF SUPPORT */

const useGif = false;

if(useGif){

document.querySelector("video").style.display="none";

document.getElementById("gifBg")
.style.display="block";

}

/* SNOW */

const snow=document.querySelector(".snow");

for(let i=0;i<45;i++){

const flake=document.createElement("span");

flake.innerHTML="❅";

flake.style.position="absolute";

flake.style.left=Math.random()*100+"vw";

flake.style.top="-10vh";

flake.style.color="rgba(0,0,0,0.95)";

flake.style.fontSize=
(Math.random()*9+12)+"px";

flake.style.animation=
`fall ${Math.random()*10+8}s linear infinite`;

flake.style.opacity=
Math.random()*0.8;

snow.appendChild(flake);

}

/* DISCORD */

const userId =
"1229664254118858842";

async function loadDiscord(){

try{

const response =
await fetch(
`https://api.lanyard.rest/v1/users/${userId}`
);

const data =
await response.json();

const discord =
data.data;

document.getElementById(
"discordName"
).innerText =
discord.discord_user.username;

let status =
discord.discord_status;

if(discord.listening_to_spotify){

status =
`Listening to ${discord.spotify.song}`;

}

document.getElementById(
"discordStatus"
).innerText =
status;

document.getElementById(
"discordAvatar"
).src =
`https://cdn.discordapp.com/avatars/${discord.discord_user.id}/${discord.discord_user.avatar}.png`;

}catch(err){

console.log(err);

}

}

loadDiscord();

setInterval(loadDiscord,15000);

</script>

</body>
</html>
