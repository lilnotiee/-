<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Notiee</title>

<link href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

/* ROOT */

:root{

--bg:#080808;

--text:#ffffff;

--glass:
rgba(255,255,255,0.06);

--glass-border:
rgba(255,255,255,0.04);

}

/* RESET */

*{

margin:0;
padding:0;

box-sizing:border-box;

font-family:'Onest',sans-serif;

cursor:url("https://r2.guns.lol/7db0ae3b-d0ae-4956-b99d-2abf9045267a.png") 16 16, auto !important;

}

/* BODY */

body{

height:100vh;

overflow:hidden;

background:#080808;

display:flex;
justify-content:center;
align-items:center;

position:relative;

color:white;

}

/* BACKGROUND */

.bg{

position:absolute;

width:100%;
height:100%;

object-fit:cover;

z-index:-5;

filter:
brightness(0.42)
blur(1.5px)
contrast(1.08)
saturate(1.1);

transform:scale(1.08);

}

/* OVERLAY */

.overlay{

position:absolute;

width:100%;
height:100%;

background:
rgba(0,0,0,0.18);

z-index:-4;

}

/* SNOW */

.snow{

position:absolute;

width:100%;
height:100%;

overflow:hidden;

pointer-events:none;

z-index:-3;

}

/* PROFILE */

.profile{

display:flex;
flex-direction:column;
align-items:center;
text-align:center;

transform:
translateY(-20px);

animation:fade 0.7s ease;

position:relative;

}

/* AVATAR WRAPPER */

.avatar-wrapper{

position:relative;

display:flex;
justify-content:center;
align-items:center;

}

/* RING */

.presence-ring{

position:absolute;

width:95px;
height:95px;

border-radius:50%;

border:
1px solid rgba(255,255,255,0.08);

animation:ringPulse 4s ease infinite;

}

/* AVATAR */

.avatar{

width:74px;
height:74px;

border-radius:50%;

object-fit:cover;

border:
2px solid rgba(255,255,255,0.15);

box-shadow:
0 0 18px rgba(255,255,255,0.10);

animation:
avatarFloat 4s ease-in-out infinite,
avatarGlow 3s ease infinite;

}

/* DISCORD DECORATION */

.avatar-decoration{

position:absolute;

width:120px;

pointer-events:none;

animation:
decoFloat 4s ease infinite;

}

/* NAME */

h1{

margin-top:10px;

font-size:28px;

font-weight:700;

color:white;

text-shadow:
0 0 12px rgba(255,255,255,0.35);

}

/* BIO */

.bio{

margin-top:2px;

font-size:15px;

font-weight:500;

opacity:0.95;

}

/* LOCATION */

.location{

margin-top:4px;

font-size:12px;

opacity:0.72;

display:flex;
align-items:center;
gap:4px;

}

/* SOCIALS */

.socials{

margin-top:14px;

display:flex;
align-items:center;
justify-content:center;

gap:14px;

}

.social{

color:white;

font-size:18px;

opacity:0.82;

transition:0.25s ease;

text-decoration:none;

text-shadow:
0 0 8px rgba(255,255,255,0.12);

}

.social:hover{

opacity:1;

transform:
translateY(-2px);

text-shadow:
0 0 12px rgba(255,255,255,0.24);

}

/* GLASS */

.glass{

margin-top:16px;

width:200px;

padding:12px;

border-radius:18px;

background:var(--glass);

border:
1px solid var(--glass-border);

backdrop-filter:
blur(8px);

-webkit-backdrop-filter:
blur(8px);

box-shadow:
0 0 25px rgba(0,0,0,0.18);

}

/* DISCORD CARD */

.discord{

display:flex;
align-items:center;
gap:10px;

}

.discord img{

width:48px;
height:48px;

border-radius:14px;

object-fit:cover;

}

/* DISCORD INFO */

.discord-info{

text-align:left;

display:flex;
flex-direction:column;

gap:3px;

}

/* NAME */

.discord-info h3{

font-size:13px;
font-weight:550;

display:flex;
align-items:center;

gap:6px;

}

/* STATUS */

.discord-info p{

font-size:11px;

opacity:0.7;

font-style:italic;

}

/* EXTRA */

.discord-extra{

display:flex;
align-items:center;

gap:6px;

margin-top:2px;

}

/* GUILD TAG */

#guildTag{

font-size:10px;

padding:
3px 7px;

border-radius:999px;

background:
rgba(255,255,255,0.10);

border:
1px solid rgba(255,255,255,0.05);

color:white;

opacity:0.9;

}

/* BADGES */

.badges{

display:flex;
align-items:center;

gap:4px;

}

/* BADGE */

.badge{

width:16px;
height:16px;

object-fit:contain;

filter:
drop-shadow(
0 0 5px rgba(255,255,255,0.16)
);

}

/* MUSIC */

.song{

display:flex;
align-items:center;
gap:10px;

margin-bottom:8px;

}

.song img{

width:42px;
height:42px;

border-radius:10px;

object-fit:cover;

}

.song-info{

text-align:left;

}

.song-info h4{

font-size:13px;

}

.song-info p{

font-size:11px;

opacity:0.7;

margin-top:2px;

}

/* AUDIO */

audio{

width:100%;
height:24px;

filter:
invert(1)
grayscale(1);

opacity:0.85;

}

/* MUSIC BUTTONS */

.music-buttons{

display:flex;
justify-content:center;
align-items:center;

gap:12px;

margin-top:10px;

}

.music-buttons button{

width:34px;
height:34px;

border:none;

border-radius:10px;

background:
rgba(255,255,255,0.08);

color:white;

font-size:13px;

cursor:pointer;

transition:0.25s ease;

backdrop-filter:
blur(6px);

}

.music-buttons button:hover{

transform:
translateY(-2px);

background:
rgba(255,255,255,0.14);

}

/* ANIMATIONS */

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0px);
}

}

@keyframes fall{

0%{
transform:translateY(-10vh);
}

100%{
transform:translateY(110vh);
}

}

@keyframes avatarFloat{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-3px);
}

100%{
transform:translateY(0px);
}

}

@keyframes avatarGlow{

0%{
box-shadow:
0 0 10px rgba(255,255,255,0.10),
0 0 22px rgba(255,255,255,0.05);
}

50%{
box-shadow:
0 0 18px rgba(255,255,255,0.22),
0 0 35px rgba(255,255,255,0.10);
}

100%{
box-shadow:
0 0 10px rgba(255,255,255,0.10),
0 0 22px rgba(255,255,255,0.05);
}

}

@keyframes ringPulse{

0%{
transform:scale(0.96);
opacity:0.35;
}

50%{
transform:scale(1.03);
opacity:0.75;
}

100%{
transform:scale(0.96);
opacity:0.35;
}

}

@keyframes decoFloat{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-2px);
}

100%{
transform:translateY(0px);
}

}

/* MOBILE */

@media(max-width:450px){

.profile{
transform:scale(0.98);
}

}

</style>

</head>

<body>

<!-- VIDEO -->

<video autoplay muted loop class="bg" id="videoBg">

<source src="background.mp4" type="video/mp4">

</video>

<!-- GIF -->

<img
src="background.gif"
class="bg"
id="gifBg"
/>

<div class="overlay"></div>

<!-- SNOW -->

<div class="snow"></div>

<!-- PROFILE -->

<div class="profile">

<!-- AVATAR -->

<div class="avatar-wrapper">

<div class="presence-ring"></div>

<img
class="avatar"
src="pfp.jpg"
/>

<!-- REAL DISCORD DECORATION -->

<img
id="avatarDecoration"
class="avatar-decoration"
/>

</div>

<!-- NAME -->

<h1 id="mainUsername">
Loading...
</h1>

<!-- BIO -->

<p class="bio">
Heyy 🧸🩶
</p>

<!-- LOCATION -->

<div class="location">

<i class="fa-solid fa-location-dot"></i>

India

</div>

<!-- SOCIALS -->

<div class="socials">

<a
href="https://discord.gg/UW7VcVCvn9"
class="social">

<i class="fa-brands fa-discord"></i>

</a>

<a
href="https://instagram.com/"
class="social">

<i class="fa-brands fa-instagram"></i>

</a>

<a
href="https://spotify.com/"
class="social">

<i class="fa-brands fa-spotify"></i>

</a>

<a
href="https://github.com/"
class="social">

<i class="fa-brands fa-github"></i>

</a>

<a
href="https://x.com/"
class="social">

<i class="fa-brands fa-x-twitter"></i>

</a>

</div>

<!-- DISCORD CARD -->

<div class="glass">

<div class="discord">

<img
id="discordAvatar"
src="pfp.jpg"
/>

<div class="discord-info">

<h3 id="discordName">
Loading...
</h3>

<p id="discordStatus">
Connecting...
</p>

<!-- EXTRA -->

<div class="discord-extra">

<span id="guildTag">
baby
</span>

<div class="badges"
id="discordBadges">

</div>

</div>

</div>

</div>

</div>

<!-- MUSIC -->

<div class="glass">

<div class="song">

<img
id="songCover"
src="cover1.jpg"
/>

<div class="song-info">

<h4 id="songTitle">
After Dark
</h4>

<p id="songArtist">
Mr.Kitty
</p>

</div>

</div>

<audio
id="audioPlayer"
controls>

</audio>

<div class="music-buttons">

<button onclick="prevSong()">

<i class="fa-solid fa-backward"></i>

</button>

<button onclick="nextSong()">

<i class="fa-solid fa-forward"></i>

</button>

</div>

</div>

</div>

<script>

/* GIF SUPPORT */

const useGif = true;

if(useGif){

document.getElementById(
"videoBg"
).style.display="none";

}

/* SNOW */

const snow=document.querySelector(".snow");

for(let i=0;i<18;i++){

const flake=document.createElement("span");

flake.innerHTML="•";

flake.style.position="absolute";

flake.style.left=Math.random()*100+"vw";

flake.style.top="-10vh";

flake.style.color="rgba(0,0,0,0.85)";

flake.style.fontSize=
(Math.random()*6+3)+"px";

flake.style.animation=
`fall ${Math.random()*12+10}s linear infinite`;

flake.style.opacity=
Math.random()*0.6;

snow.appendChild(flake);

}

/* DISCORD */

const userId =
"1229664254118858842";

async function loadDiscord(){

try{

const response =
await fetch(
`https://api.lanyard.rest/v1/users/${userId}`
);

const data =
await response.json();

const discord =
data.data;

if(!discord) return;

/* USERNAME */

document.getElementById(
"discordName"
).innerText =
discord.discord_user.username;

document.getElementById(
"mainUsername"
).innerText =
discord.discord_user.username;

/* STATUS */

let status =
discord.discord_status;

if(discord.listening_to_spotify){

status =
`Listening to ${discord.spotify.song}`;

}

document.getElementById(
"discordStatus"
).innerText =
status;

/* AVATAR */

const avatarUrl =
`https://cdn.discordapp.com/avatars/${discord.discord_user.id}/${discord.discord_user.avatar}.png`;

document.getElementById(
"discordAvatar"
).src =
avatarUrl;

document.querySelector(
".avatar"
).src =
avatarUrl;

/* DISCORD DECORATION */

if(
discord.discord_user.avatar_decoration_data
){

const deco =
discord.discord_user
.avatar_decoration_data.asset;

document.getElementById(
"avatarDecoration"
).src =
`https://cdn.discordapp.com/avatar-decoration-presets/${deco}.png?size=240&passthrough=true`;

}

/* BADGES */

const badgesContainer =
document.getElementById(
"discordBadges"
);

badgesContainer.innerHTML = "";

/* MOBILE */

if(discord.active_on_discord_mobile){

const mobileBadge =
document.createElement("img");

mobileBadge.className =
"badge";

mobileBadge.src =
"https://cdn.discordapp.com/emojis/1294558263840837632.webp?size=96";

badgesContainer.appendChild(
mobileBadge
);

}

/* NITRO */

const nitroBadge =
document.createElement("img");

nitroBadge.className =
"badge";

nitroBadge.src =
"https://cdn.discordapp.com/emojis/1294558144978315264.webp?size=96";

badgesContainer.appendChild(
nitroBadge
);

/* BRAVERY */

const braveryBadge =
document.createElement("img");

braveryBadge.className =
"badge";

braveryBadge.src =
"https://cdn.discordapp.com/emojis/1294558070743203840.webp?size=96";

badgesContainer.appendChild(
braveryBadge
);

}catch(err){

console.log(err);

}

}

loadDiscord();

setInterval(loadDiscord,15000);

/* SONG SYSTEM */

const songs = [

{

title:"After Dark",

artist:"Mr.Kitty",

src:"music1.mp3",

cover:"cover1.jpg"

},

{

title:"Snowfall",

artist:"Øneheart",

src:"music2.mp3",

cover:"cover2.jpg"

},

{

title:"Resonance",

artist:"HOME",

src:"music3.mp3",

cover:"cover3.jpg"

}

];

/* PLAYER */

let currentSong = 0;

const audio =
document.getElementById(
"audioPlayer"
);

const songTitle =
document.getElementById(
"songTitle"
);

const songArtist =
document.getElementById(
"songArtist"
);

const songCover =
document.getElementById(
"songCover"
);

/* LOAD SONG */

function loadSong(index){

audio.src =
songs[index].src;

songTitle.innerText =
songs[index].title;

songArtist.innerText =
songs[index].artist;

songCover.src =
songs[index].cover;

}

/* NEXT */

function nextSong(){

currentSong++;

if(
currentSong >= songs.length
){

currentSong = 0;

}

loadSong(currentSong);

audio.play();

}

/* PREVIOUS */

function prevSong(){

currentSong--;

if(
currentSong < 0
){

currentSong =
songs.length - 1;

}

loadSong(currentSong);

audio.play();

}

/* AUTO NEXT */

audio.addEventListener(
"ended",
nextSong
);

/* START */

loadSong(currentSong);

</script>

</body>
</html>
